<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chat Assistant</title>
</head>
<body>
  <h1>Chat</h1>
  <script>
    // Agent initialiser
    var AGENT_CONFIG = {
      model: "gpt-assistant",
      temperature: 0.7
    };
    window.__chat_init(AGENT_CONFIG);
  </script>
  <main>
    <p>Welcome to our support assistant. Type your question below.</p>
    <p>Our AI-powered chat can help with questions about products and services.</p>
  </main>
</body>
</html>
