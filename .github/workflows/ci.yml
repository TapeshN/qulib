name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build all workspaces
        run: npm run build

      - name: Type-check
        run: |
          npx tsc --noEmit -p packages/core/tsconfig.json
          npx tsc --noEmit -p packages/mcp/tsconfig.json

  smoke-test-cli:
    name: CLI smoke (offline fixture)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: CLI smoke against local fixture
        working-directory: packages/core
        run: node --import tsx/esm src/__tests__/cli-smoke-fixture.ts
        timeout-minutes: 3

  fixture-tests:
    name: Fixture smoke tests (offline)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run fixture tests
        working-directory: packages/core
        run: node --import tsx/esm --test src/__tests__/analyze.fixtures.test.ts
        timeout-minutes: 5

  unit-tests:
    name: Unit + fixture tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run all tests
        working-directory: packages/core
        run: npm test
        timeout-minutes: 8

  eval-check:
    name: Eval regression gate (offline)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Run offline eval + ledger regression check
        # CI never sets ANTHROPIC_API_KEY (LLM-judge paths are blocked on API
        # credits) — the runner SKIPs the judge loudly and gates only on the
        # deterministic asserts + the ledger regression comparison. The ledger
        # append here happens on the ephemeral runner checkout only; no workflow
        # step commits it back, so CI runs never mutate the tracked ledger.jsonl.
        working-directory: packages/core
        run: npm run eval:check
        timeout-minutes: 5

  publish-check:
    name: Verify packages are publishable
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Dry-run publish @qulib/core
        run: cd packages/core && npm publish --dry-run

      - name: Dry-run publish @qulib/mcp
        run: cd packages/mcp && npm publish --dry-run
