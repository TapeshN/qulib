name: Proposal — Refine

on:
  issue_comment:
    types: [created]

jobs:
  refine:
    if: |
      startsWith(github.event.comment.body, '/refine') &&
      contains(github.event.issue.labels.*.name, 'proposal')
    uses: TapeshN/Tap-Agent/.github/workflows/proposal-refine-reusable.yml@main
    secrets: inherit
