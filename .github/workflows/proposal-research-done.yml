name: Proposal — Research Done

on:
  issue_comment:
    types: [created]

jobs:
  research_done:
    if: |
      startsWith(github.event.comment.body, '/research-done') &&
      contains(github.event.issue.labels.*.name, 'approved')
    uses: TapeshN/Tap-Agent/.github/workflows/_reusable-proposal-research-done.yml@main
    secrets: inherit
