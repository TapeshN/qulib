name: Proposal — Approve

on:
  issue_comment:
    types: [created]

jobs:
  approve:
    if: |
      startsWith(github.event.comment.body, '/approve') &&
      contains(github.event.issue.labels.*.name, 'proposal')
    uses: TapeshN/Tap-Agent/.github/workflows/_reusable-proposal-approve.yml@main
    secrets: inherit
